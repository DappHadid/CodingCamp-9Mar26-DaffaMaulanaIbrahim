<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Performance Verification</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .test-result {
            margin: 10px 0;
            padding: 10px;
            border-radius: 3px;
        }
        .pass {
            background-color: #d4edda;
            color: #155724;
        }
        .fail {
            background-color: #f8d7da;
            color: #721c24;
        }
        button {
            padding: 8px 16px;
            margin: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Performance Enhancements Verification</h1>
    
    <div class="test-section">
        <h2>Test 1: Debounced Storage Operations</h2>
        <button onclick="testDebouncedStorage()">Run Test</button>
        <div id="debounce-result"></div>
    </div>

    <div class="test-section">
        <h2>Test 2: Optimized Render with DocumentFragment</h2>
        <button onclick="testOptimizedRender()">Run Test</button>
        <div id="render-result"></div>
    </div>

    <div class="test-section">
        <h2>Test 3: RequestAnimationFrame Timer Updates</h2>
        <button onclick="testAnimationFrame()">Run Test</button>
        <div id="animation-result"></div>
    </div>

    <div class="test-section">
        <h2>Test 4: Non-blocking Storage Operations</h2>
        <button onclick="testAsyncStorage()">Run Test</button>
        <div id="async-result"></div>
    </div>

    <script src="js/PerformanceUtils.js"></script>
    <script src="js/NotificationManager.js"></script>
    <script src="js/StorageManager.js"></script>
    <script src="js/TaskListComponent.js"></script>
    <script src="js/TimerComponent.js"></script>

    <script>
        function showResult(elementId, message, passed) {
            const element = document.getElementById(elementId);
            element.innerHTML = `<div class="test-result ${passed ? 'pass' : 'fail'}">${message}</div>`;
        }

        // Test 1: Debounced Storage Operations
        function testDebouncedStorage() {
            const resultId = 'debounce-result';
            showResult(resultId, 'Testing debounced storage...', true);

            let callCount = 0;
            const originalSet = StorageManager.setAsync;
            
            // Mock setAsync to count calls
            StorageManager.setAsync = function() {
                callCount++;
                return Promise.resolve(true);
            };

            // Create a debounced function
            const debouncedFn = PerformanceUtils.debounce(() => {
                StorageManager.setAsync('test', 'value');
            }, 100);

            // Call it multiple times rapidly
            for (let i = 0; i < 10; i++) {
                debouncedFn();
            }

            // Check after debounce period
            setTimeout(() => {
                StorageManager.setAsync = originalSet;
                const passed = callCount === 1;
                showResult(resultId, 
                    `Debounce test: Called ${callCount} time(s) instead of 10. ${passed ? 'PASS' : 'FAIL'}`,
                    passed
                );
            }, 200);
        }

        // Test 2: Optimized Render with DocumentFragment
        function testOptimizedRender() {
            const resultId = 'render-result';
            
            // Create a container
            const container = document.createElement('div');
            container.innerHTML = '<div class="task-input-container"></div><div class="task-list"></div>';
            
            // Create component
            const taskList = new TaskListComponent(container);
            taskList.init();

            // Add multiple tasks
            const startTime = performance.now();
            for (let i = 0; i < 50; i++) {
                taskList.tasks.push({
                    id: `task-${i}`,
                    description: `Test task ${i}`,
                    completed: false,
                    createdAt: Date.now()
                });
            }
            
            // Render all at once
            taskList.render();
            const endTime = performance.now();
            const renderTime = endTime - startTime;

            const passed = renderTime < 100; // Should render 50 tasks in under 100ms
            showResult(resultId, 
                `Rendered 50 tasks in ${renderTime.toFixed(2)}ms. ${passed ? 'PASS' : 'FAIL'}`,
                passed
            );
        }

        // Test 3: RequestAnimationFrame Timer Updates
        function testAnimationFrame() {
            const resultId = 'animation-result';
            
            // Create a container
            const container = document.createElement('div');
            
            // Create timer component
            const timer = new TimerComponent(container);
            timer.init();

            // Check if animation frame methods exist
            const hasScheduleRender = typeof timer.scheduleRender === 'function';
            const hasCancelRender = typeof timer.cancelRender === 'function';
            
            const passed = hasScheduleRender && hasCancelRender;
            showResult(resultId, 
                `Timer has requestAnimationFrame methods: ${passed ? 'PASS' : 'FAIL'}`,
                passed
            );

            timer.destroy();
        }

        // Test 4: Non-blocking Storage Operations
        async function testAsyncStorage() {
            const resultId = 'async-result';
            showResult(resultId, 'Testing async storage...', true);

            const startTime = performance.now();
            
            // Test async storage
            const result = await StorageManager.setAsync('test-async', { data: 'test' });
            
            const endTime = performance.now();
            const asyncTime = endTime - startTime;

            // Verify it was saved
            const retrieved = StorageManager.get('test-async');
            const passed = result && retrieved && retrieved.data === 'test';

            showResult(resultId, 
                `Async storage completed in ${asyncTime.toFixed(2)}ms. Data saved and retrieved correctly. ${passed ? 'PASS' : 'FAIL'}`,
                passed
            );

            // Cleanup
            StorageManager.remove('test-async');
        }
    </script>
</body>
</html>
