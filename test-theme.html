<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            transition: all 0.3s ease;
        }
        
        body.dark-theme {
            background-color: #1a1a2e;
            color: #ecf0f1;
        }
        
        .test-section {
            margin: 20px 0;
            padding: 20px;
            border: 2px solid #ccc;
            border-radius: 8px;
        }
        
        body.dark-theme .test-section {
            border-color: #34495e;
            background-color: #2c3e50;
        }
        
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }
        
        .theme-toggle-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: white;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        body.dark-theme .theme-toggle-btn {
            background: #34495e;
            color: #ecf0f1;
        }
    </style>
</head>
<body>
    <h1>Theme Manager Test</h1>
    
    <div class="test-section">
        <h2>Current Status</h2>
        <p>Current Theme: <strong id="current-theme">Loading...</strong></p>
        <p>Body Classes: <strong id="body-classes">Loading...</strong></p>
        <p>Saved Theme: <strong id="saved-theme">Loading...</strong></p>
    </div>
    
    <div class="test-section">
        <h2>Manual Tests</h2>
        <button onclick="testToggle()">Toggle Theme</button>
        <button onclick="testSetLight()">Set Light</button>
        <button onclick="testSetDark()">Set Dark</button>
        <button onclick="testClearStorage()">Clear Storage</button>
        <button onclick="updateStatus()">Refresh Status</button>
    </div>
    
    <div class="test-section">
        <h2>Console Log</h2>
        <div id="console-log" style="background: #f5f5f5; padding: 10px; border-radius: 4px; max-height: 300px; overflow-y: auto;"></div>
    </div>

    <script src="js/StorageManager.js"></script>
    <script src="js/ThemeManager.js"></script>
    <script>
        // Custom console logging
        const logDiv = document.getElementById('console-log');
        function log(message, type = 'info') {
            const entry = document.createElement('div');
            entry.style.padding = '5px';
            entry.style.borderBottom = '1px solid #ddd';
            entry.style.color = type === 'error' ? 'red' : type === 'success' ? 'green' : 'black';
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        // Update status display
        function updateStatus() {
            document.getElementById('current-theme').textContent = ThemeManager.getCurrentTheme();
            document.getElementById('body-classes').textContent = document.body.className || '(none)';
            document.getElementById('saved-theme').textContent = StorageManager.get('theme', 'not set');
            log('Status updated');
        }

        // Test functions
        function testToggle() {
            const newTheme = ThemeManager.toggleTheme();
            log(`Toggled to: ${newTheme}`, 'success');
            updateStatus();
        }

        function testSetLight() {
            ThemeManager.setTheme('light');
            log('Set to light theme', 'success');
            updateStatus();
        }

        function testSetDark() {
            ThemeManager.setTheme('dark');
            log('Set to dark theme', 'success');
            updateStatus();
        }

        function testClearStorage() {
            StorageManager.remove('theme');
            log('Cleared theme from storage', 'success');
            updateStatus();
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            log('DOM Content Loaded');
            log('Initializing ThemeManager...');
            
            try {
                ThemeManager.init();
                log('ThemeManager initialized successfully', 'success');
            } catch (error) {
                log(`Error initializing ThemeManager: ${error.message}`, 'error');
            }
            
            // Create toggle button
            const header = document.querySelector('h1');
            if (header) {
                ThemeManager.createToggleButton(document.body);
                log('Theme toggle button created', 'success');
            }
            
            updateStatus();
        });
    </script>
</body>
</html>
